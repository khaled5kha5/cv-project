name: cv_project1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.2
  image_picker: ^1.2.0
  salomon_bottom_bar: ^3.3.2
  provider: ^6.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: assets/icon/image.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/image.png